<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 3px solid blue;
            width: 400px;
            position: relative;
        
        }

        .box{
            border: 3px solid red;
            padding: 10px;
            
        }

        .boxColor{
            border-color: black;
            position: absolute;
            top: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box1</div>
        <div class="box boxColor">box2</div>
    </div>
</body>
</html>
